name: Release

# Fully automatic releases. Push a Conventional Commit to `main`
# (fix: -> patch, feat: -> minor, feat!:/BREAKING CHANGE: -> major) and
# semantic-release versions, tags, publishes to npm (with provenance),
# updates CHANGELOG.md + package.json, and cuts the matching GitHub Release.
# Non-releasing commits (docs:/chore:/ci:/refactor:/test:) publish nothing.

on:
  push:
    branches: [main]

permissions:
  contents: write # push the changelog/version commit + tag, create the Release
  issues: write
  pull-requests: write
  id-token: write # npm provenance via OIDC

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: do NOT set registry-url here — it generates an .npmrc with
          # _authToken=${NODE_AUTH_TOKEN} that shadows the token and breaks
          # semantic-release auth. semantic-release manages .npmrc from NPM_TOKEN.
      - run: npm install # package-lock.json is gitignored in this repo, so not `npm ci`
      - run: npm run build
      - run: npm run lint
      - name: Debug NPM_TOKEN (temporary)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LEN=${#NPM_TOKEN}
          SHA=$(printf %s "$NPM_TOKEN" | sha256sum | cut -c1-12)
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
          if npm whoami --registry https://registry.npmjs.org/ >/dev/null 2>&1; then W=OK; else W=FAIL; fi
          TAG="diag-len${LEN}-${SHA}-whoami${W}"
          echo "DIAG => $TAG"
          git tag -f "$TAG"
          git push -f "https://x-access-token:${GH_PUSH_TOKEN}@github.com/micbwilliam/n8n-nodes-socialmate.git" "refs/tags/$TAG"
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
