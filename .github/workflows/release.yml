name: Release

# Tag-driven releases. Pushing a `v*` tag builds, lints, strips
# devDependencies, publishes THAT EXACT version to npm (with provenance) and
# cuts the matching GitHub Release with auto-generated notes. The tag names the
# version. Pushing commits to `main` publishes NOTHING.
#
# Cut a release from a clean main:
#   npm run release:patch   # or release:minor / release:major
# (bumps package.json, commits, creates vX.Y.Z, pushes commit + tag)
# Or tag by hand:
#   git tag v2.6.0 && git push origin v2.6.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance via OIDC

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff against prior tags
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Writes an .npmrc wiring `npm publish` auth to NODE_AUTH_TOKEN. (The
          # old warning against registry-url applied to semantic-release, which
          # managed its own .npmrc — we publish directly now, so this is correct.)
          registry-url: "https://registry.npmjs.org"
      - run: npm install # package-lock.json is gitignored in this repo, so not `npm ci`
      - run: npm run build
      - run: npm run lint
      - run: npm test # gate the publish on the unit + integration + drift suite
      # Pin package.json to the pushed tag (vX.Y.Z -> X.Y.Z). The tag is the
      # single source of truth for the version; --allow-same-version makes this a
      # no-op when the tagged commit already carries the bump (the `npm version`
      # flow), and forces the version when someone tags a bare commit.
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      # Strip devDependencies so the PUBLISHED package.json carries ZERO deps —
      # supply-chain scanners (Socket, npm audit) only ever see the shipped
      # artifact. Tools stay installed in node_modules; the repo file is untouched.
      - run: npm pkg delete devDependencies
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
